  <g transform="translate(256 256) scale(0.62) translate(-160 -150)">
    <g transform="translate(0 0)" fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 30 C0 18 8 12 22 12 L140 12 C152 12 160 22 160 36 L160 220 C160 210 152 204 140 204 L22 204 C8 204 0 210 0 222 Z" fill="#fff7e8"/>
      <path d="M320 30 C320 18 312 12 298 12 L180 12 C168 12 160 22 160 36 L160 220 C160 210 168 204 180 204 L298 204 C312 204 320 210 320 222 Z" fill="#fff7e8"/>
      <line x1="160" y1="36" x2="160" y2="222"/>
      <line x1="30" y1="60" x2="130" y2="60"/>
      <line x1="30" y1="90" x2="130" y2="90"/>
      <line x1="30" y1="120" x2="130" y2="120"/>
      <line x1="190" y1="60" x2="290" y2="60"/>
      <line x1="190" y1="90" x2="290" y2="90"/>
      <line x1="190" y1="120" x2="290" y2="120"/>
    </g>
    <text x="160" y="290" text-anchor="middle"
          font-family="-apple-system, ui-serif, 'Apple Color Emoji', 'Segoe UI', sans-serif"
          font-size="64" font-weight="800" fill="#3a2a05" letter-spacing="2">ҚИССАЛАР</text>
  </g>
