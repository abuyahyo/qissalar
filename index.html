<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f7f3ea">
<script>
  // Set the theme and font size before first paint to avoid a flash (FOUC).
  (function () {
    try {
      var t = localStorage.getItem('qissalar.theme');
      if (t !== 'dark' && t !== 'light')
        t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
      var fp = parseInt(localStorage.getItem('qissalar.fontPx'), 10);
      if (fp >= 16 && fp <= 30)
        document.documentElement.style.setProperty('--fz', fp + 'px');
    } catch (e) {}
  })();
</script>
<title>Пайғамбарлар қиссаси — болалар учун</title>
<meta name="description" content="Шайх Муҳаммад Содиқ Муҳаммад Юсуф ҳазратлари болалар учун қайта баён этган пайғамбарлар қиссаси. Ота-оналар ва устозлар болаларга овоз чиқариб ўқиб бериши учун интерактив реадер.">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Қиссалар">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="topbar" id="topbar">
  <button class="iconbtn" id="backBtn" aria-label="Орқага">←</button>
  <div class="brand">
    <span class="brand-emoji">📖</span>
    <span class="brand-text">Қиссалар</span>
  </div>
  <button class="iconbtn" id="settingsBtn" aria-label="Созламалар" aria-haspopup="true" aria-expanded="false">⚙️</button>

  <div class="settings-panel" id="settingsPanel" role="menu" aria-label="Созламалар" hidden>
    <div class="set-row">
      <span class="set-label" data-tx="Ёзув">Ёзув</span>
      <button class="iconbtn" id="scriptBtn" aria-label="Кирилл / Лотин">Lat</button>
    </div>
    <div class="set-row">
      <span class="set-label" data-tx="Режим">Режим</span>
      <button class="iconbtn" id="themeBtn" aria-label="Тунги режим">🌙</button>
    </div>
    <div class="set-row">
      <span class="set-label" data-tx="Шрифт">Шрифт</span>
      <div class="font-ctrl">
        <button class="iconbtn" id="fontDown" aria-label="Шрифтни кичиклаштириш">A−</button>
        <button class="iconbtn" id="fontUp" aria-label="Шрифтни катталаштириш">A+</button>
      </div>
    </div>
  </div>
</header>

<main id="app" class="container"></main>

<footer class="footer">
  <small>Манба: <a href="https://islom.uz/maqola/2396" target="_blank" rel="noopener noreferrer">islom.uz</a> · Муаллиф: Шайх Муҳаммад Содиқ Муҳаммад Юсуф</small>
</footer>

<script src="app.js"></script>
</body>
</html>
